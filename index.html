<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Word Slice - Academic Word Slicer</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  overflow: hidden;
  background: #1a0a2e;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

canvas {
  display: block;
  position: absolute;
  top: 0;
  left: 0;
}

#ui-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 10;
}

#score-display {
  position: absolute;
  top: 20px;
  left: 20px;
  color: #ffd700;
  font-size: 28px;
  font-weight: bold;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}

#lives-display {
  position: absolute;
  top: 20px;
  right: 20px;
  color: #ff4444;
  font-size: 28px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}

#combo-display {
  position: absolute;
  top: 60px;
  left: 20px;
  color: #ff8800;
  font-size: 20px;
  font-weight: bold;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
  opacity: 0;
  transition: opacity 0.3s;
}

#start-screen, #game-over-screen {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(10, 5, 30, 0.95);
  pointer-events: auto;
  z-index: 20;
}

#game-over-screen { display: none; }

h1 {
  color: #ffd700;
  font-size: 52px;
  text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
  margin-bottom: 10px;
}

.subtitle {
  color: #aaa;
  font-size: 18px;
  margin-bottom: 40px;
}

.instruction {
  color: #ccc;
  font-size: 16px;
  max-width: 500px;
  text-align: center;
  line-height: 1.6;
  margin-bottom: 30px;
  padding: 0 20px;
}

.btn {
  background: linear-gradient(135deg, #ff6b35, #ff4444);
  color: white;
  border: none;
  padding: 16px 48px;
  font-size: 22px;
  border-radius: 50px;
  cursor: pointer;
  text-transform: uppercase;
  font-weight: bold;
  letter-spacing: 2px;
  box-shadow: 0 4px 15px rgba(255, 68, 68, 0.4);
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 20px rgba(255, 68, 68, 0.6);
}

#final-score {
  color: #ffd700;
  font-size: 48px;
  font-weight: bold;
  margin: 20px 0;
}

#final-label {
  color: #aaa;
  font-size: 20px;
}

.slash-trail {
  position: absolute;
  pointer-events: none;
  z-index: 5;
}
</style>
</head>
<body>

<canvas id="game-canvas"></canvas>

<div id="ui-overlay">
  <div id="score-display">Score: 0</div>
  <div id="lives-display"></div>
  <div id="combo-display"></div>
</div>

<div id="start-screen">
  <h1>Word Slice</h1>
  <div class="subtitle">Academic Word Slicer</div>
  <div class="instruction">
    Swipe through academic words at their syllable boundary to slice them!
    For example, slice "con|cept" between "con" and "cept".
    Miss too many words and it's game over!
  </div>
  <button class="btn" id="start-btn">Play</button>
</div>

<div id="game-over-screen">
  <h1>Game Over</h1>
  <div id="final-label">Final Score</div>
  <div id="final-score">0</div>
  <button class="btn" id="restart-btn">Play Again</button>
</div>

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Game state
let score = 0;
let lives = 3;
let combo = 0;
let gameRunning = false;
let words = []; // active flying words
let slicedParts = []; // sliced halves flying away
let particles = [];

let spawnTimer = 0;
let spawnInterval = 2000;

let isPointerDown = false;

const scoreEl = document.getElementById('score-display');
const livesEl = document.getElementById('lives-display');

function updateUI() {
  scoreEl.textContent = `Score: ${score}`;
  livesEl.textContent = Array(lives).fill('\u2764').join(' ');
  if (combo > 1) {
    comboEl.textContent = `Combo x${combo}!`;
    comboEl.style.opacity = 1;
  } else {
    comboEl.style.opacity = 0;
  }
}

function pickWord() {
  return WORDS[Math.floor(Math.random() * WORDS.length)];
}

function measureWordWidth(word, fontSize) {
  ctx.font = `bold ${fontSize}px 'Segoe UI', Tahoma, sans-serif`;
  return ctx.measureText(word).width;
}

function spawnWord() {
  const data = pickWord();
  const fontSize = Math.min(48, Math.max(32, W * 0.05));
  const wordWidth = measureWordWidth(data.word, fontSize);
  const padding = 30;

  // Random horizontal position, keeping word fully visible
  const x = padding + Math.random() * (W - wordWidth - padding * 2);

  // Start at bottom of viewport (just inside, accounting for font height)
  const y = H - fontSize;

  // Target apex: between 10% and 20% from top of viewport
  const apexY = H * (0.10 + Math.random() * 0.10);

  // Calculate physics to hit the desired apex
  // At apex, vy = 0. Using v^2 = v0^2 + 2*a*d where a=gravity, d=distance
  // We need vy_initial such that it reaches apexY from y
  const riseDistance = y - apexY; // positive (going up)
  const gravity = 0.15 + Math.random() * 0.05; // pixels per frame^2
  // v0 = sqrt(2 * g * d)
  const vy = -Math.sqrt(2 * gravity * riseDistance);

  // Slight horizontal drift with varying angles
  const vx = (Math.random() - 0.5) * 3;

  // Measure the pixel position of the split point
  ctx.font = `bold ${fontSize}px 'Segoe UI', Tahoma, sans-serif`;
  const firstHalfWidth = ctx.measureText(data.first).width;

  words.push({
    word: data.word,
    first: data.first,
    second: data.second,
    splitIndex: data.splitIndex,
    x, y, vx, vy,
    gravity,
    fontSize,
    wordWidth,
    firstHalfWidth,
    rotation: 0,
    rotationSpeed: (Math.random() - 0.5) * 0.02,
    missed: false,
    alpha: 1,
  });
}

    y: y,

    gravity: wordObj.gravity * 1.5,
    fontSize,
    rotation: rotation - 0.05,
    rotationSpeed: -0.03 - Math.random() * 0.03,
    alpha: 1,
    color: '#44ff88',
  });

    text: second,
    x: x + firstHalfWidth + 4,
    y: y,
    vx: vx + 2 + Math.random() * 2,
    vy: vy - 1 - Math.random(),
    gravity: wordObj.gravity * 1.5,
    fontSize,
    rotation: rotation + 0.05,
    rotationSpeed: 0.03 + Math.random() * 0.03,

      y: y + (Math.random() - 0.5) * 10,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8 - 2,
      life: 1,
      decay: 0.02 + Math.random() * 0.02,
      size: 2 + Math.random() * 4,
      color: Math.random() > 0.5 ? '#ffd700' : '#ff8800',
    });
  }

  combo++;
  score += 10 * combo;
  updateUI();
}

function missWord() {
  lives--;
  combo = 0;
  updateUI();
  if (lives <= 0) {
    endGame();
  }
}

function checkSlice(x1, y1, x2, y2) {
  for (let i = words.length - 1; i >= 0; i--) {
    const w = words[i];
    const wordTop = w.y - w.fontSize * 0.8;
    const wordBot = w.y + w.fontSize * 0.2;
    const wordLeft = w.x - 10;
    const wordRight = w.x + w.wordWidth + 10;

    // Check if the swipe line intersects the word bounding box
    if (!lineIntersectsRect(x1, y1, x2, y2, wordLeft, wordTop, wordRight, wordBot)) continue;

    // Check if swipe crosses near the syllable boundary
    const splitX = w.x + w.firstHalfWidth;
    const bufferPx = Math.max(w.wordWidth * 0.2, 20); // 20% of word width or 20px buffer

    // Find where the swipe line crosses the word's y range
    const crossX = interpolateX(x1, y1, x2, y2, (wordTop + wordBot) / 2);
    if (crossX !== null && Math.abs(crossX - splitX) < bufferPx) {
      sliceWord(w, (y1 + y2) / 2);
      words.splice(i, 1);
    }
  }
}

function interpolateX(x1, y1, x2, y2, targetY) {
  if (Math.abs(y2 - y1) < 0.001) return (x1 + x2) / 2;
  const t = (targetY - y1) / (y2 - y1);
  if (t < -0.5 || t > 1.5) return null;
  return x1 + t * (x2 - x1);
}

function lineIntersectsRect(x1, y1, x2, y2, rx, ry, rx2, ry2) {
  // Simple check: does the line segment pass through or near the rect?
  const minX = Math.min(x1, x2), maxX = Math.max(x1, x2);
  const minY = Math.min(y1, y2), maxY = Math.max(y1, y2);
  return !(maxX < rx || minX > rx2 || maxY < ry || minY > ry2);
}

// Drawing
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0520');
  grad.addColorStop(0.5, '#1a0a2e');
  grad.addColorStop(1, '#0d1b2a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawWord(w) {
  ctx.save();
  ctx.globalAlpha = w.alpha;
  ctx.translate(w.x + w.wordWidth / 2, w.y);
  ctx.rotate(w.rotation);
  ctx.font = `bold ${w.fontSize}px 'Segoe UI', Tahoma, sans-serif`;
  ctx.textBaseline = 'middle';

  const offsetX = -w.wordWidth / 2;

  // Draw background pill
  const pad = 12;
  ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
  roundRect(ctx, offsetX - pad, -w.fontSize * 0.6, w.wordWidth + pad * 2, w.fontSize * 1.2, 8);
  ctx.fill();

  // Draw word in uniform color
  ctx.fillStyle = '#ffffff';
  ctx.fillText(w.word, offsetX, 0);

  ctx.restore();
}

function drawSlicedPart(p) {
  ctx.save();
  ctx.globalAlpha = p.alpha;
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rotation);
  ctx.font = `bold ${p.fontSize}px 'Segoe UI', Tahoma, sans-serif`;
  ctx.textBaseline = 'middle';
  ctx.fillStyle = p.color;
  ctx.shadowColor = p.color;
  ctx.shadowBlur = 10;
  ctx.fillText(p.text, 0, 0);
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawSlashTrail() {
  if (slashTrail.length < 2) return;
  ctx.save();
  for (let i = 1; i < slashTrail.length; i++) {
    const prev = slashTrail[i - 1];
    const curr = slashTrail[i];
    const alpha = curr.life;
    const width = alpha * 4;
    ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(prev.x, prev.y);
    ctx.lineTo(curr.x, curr.y);
    ctx.stroke();
  }
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Game loop
function update(dt) {
  // Spawn words
  spawnTimer += dt;
  difficulty = Math.min(score / 500, 1); // ramp up over 500 points
  const currentInterval = Math.max(800, spawnInterval - difficulty * 1200);
  if (spawnTimer > currentInterval) {
    spawnWord();
    spawnTimer = 0;
    // Occasionally spawn 2 at once at higher difficulty
    if (difficulty > 0.5 && Math.random() < difficulty * 0.3) {
      setTimeout(spawnWord, 200 + Math.random() * 300);
    }
  }

  // Update flying words
  const timeScale = dt / 16.67; // normalize to 60fps
  for (let i = words.length - 1; i >= 0; i--) {
    const w = words[i];
    w.x += w.vx * timeScale;
    w.vy += w.gravity * timeScale;
    w.y += w.vy * timeScale;
    w.rotation += w.rotationSpeed * timeScale;

    // Keep word horizontally within viewport
    if (w.x < 0) { w.x = 0; w.vx = Math.abs(w.vx) * 0.5; }
    if (w.x + w.wordWidth > W) { w.x = W - w.wordWidth; w.vx = -Math.abs(w.vx) * 0.5; }

    // Word fell back to bottom of viewport without being sliced
    if (w.y > H - w.fontSize * 0.5 && w.vy > 0) {
      words.splice(i, 1);
      missWord();
    }
  }

  // Update sliced parts
  for (let i = slicedParts.length - 1; i >= 0; i--) {
    const p = slicedParts[i];
    p.x += p.vx;
    p.vy += p.gravity;
    p.y += p.vy;
    p.rotation += p.rotationSpeed;
    p.alpha -= 0.008;
    if (p.alpha <= 0 || p.y > H + 100) {
      slicedParts.splice(i, 1);
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= p.decay;
    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }

  // Update slash trail
  for (let i = slashTrail.length - 1; i >= 0; i--) {
    slashTrail[i].life -= 0.05;
    if (slashTrail[i].life <= 0) {
      slashTrail.splice(i, 1);
    }
  }
}

function draw() {
  drawBackground();
  drawSlashTrail();
  for (const w of words) drawWord(w);
  for (const p of slicedParts) drawSlicedPart(p);
  drawParticles();
}

function gameLoop(timestamp) {
  if (!gameRunning) return;
  const dt = lastTime ? timestamp - lastTime : 16;
  lastTime = timestamp;
  update(dt);
  draw();
  animFrame = requestAnimationFrame(gameLoop);
}

function startGame() {
  score = 0;
  lives = 3;
  combo = 0;
  words = [];
  slicedParts = [];
  particles = [];
  slashTrail = [];
  spawnTimer = 0;
  lastTime = 0;
  gameRunning = true;
  updateUI();
  startScreen.style.display = 'none';
  gameOverScreen.style.display = 'none';
  animFrame = requestAnimationFrame(gameLoop);
}

function endGame() {
  gameRunning = false;
  if (animFrame) cancelAnimationFrame(animFrame);
  finalScoreEl.textContent = score;
  gameOverScreen.style.display = 'flex';
}

// Input handling
function getPointerPos(e) {
  const touch = e.touches ? e.touches[0] : e;
  return { x: touch.clientX, y: touch.clientY };
}

canvas.addEventListener('mousedown', (e) => {
  if (!gameRunning) return;
  isPointerDown = true;
  const pos = getPointerPos(e);
  pointerPath = [pos];
});

canvas.addEventListener('mousemove', (e) => {
  if (!isPointerDown || !gameRunning) return;
  const pos = getPointerPos(e);
  pointerPath.push(pos);
  slashTrail.push({ x: pos.x, y: pos.y, life: 1 });

  if (pointerPath.length >= 2) {
    const prev = pointerPath[pointerPath.length - 2];
    const curr = pointerPath[pointerPath.length - 1];
    checkSlice(prev.x, prev.y, curr.x, curr.y);
  }
});

canvas.addEventListener('mouseup', () => {
  isPointerDown = false;
  pointerPath = [];
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (!gameRunning) return;
  isPointerDown = true;
  const pos = getPointerPos(e);
  pointerPath = [pos];
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!isPointerDown || !gameRunning) return;
  const touch = e.touches[0];
  const pos = { x: touch.clientX, y: touch.clientY };
  pointerPath.push(pos);
  slashTrail.push({ x: pos.x, y: pos.y, life: 1 });

  if (pointerPath.length >= 2) {
    const prev = pointerPath[pointerPath.length - 2];
    const curr = pointerPath[pointerPath.length - 1];
    checkSlice(prev.x, prev.y, curr.x, curr.y);
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  isPointerDown = false;
  pointerPath = [];
}, { passive: false });

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// Initial draw
drawBackground();
</script>
</body>
</html>
